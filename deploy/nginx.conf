server {
    listen 80;
    server_name imoterraboa.solutecno.com.br;

    # Limite de tamanho de upload de arquivos (ex: imagens de equipamentos)
    client_max_body_size 20M;

    # Otimização de Performance Mobile (Gzip)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # Servir arquivos estáticos diretamente pelo Nginx para alta performance
    location /static/ {
        alias /var/www/inventario/frontend/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy reverso encaminhando requisições para o Gunicorn na porta 5000
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Evita timeouts em requisições demoradas
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
    }
}
